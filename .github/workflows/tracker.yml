name: Ali Tracker

on:
  workflow_dispatch:
  schedule:
    # 09:05, 15:05, 21:05 e 21:45 em America/Sao_Paulo (UTC-3)
    - cron: "5 12 * * *"
    - cron: "5 18 * * *"
    - cron: "5 0 * * *"
    - cron: "45 0 * * *"

concurrency:
  group: ali-tracker-cron
  cancel-in-progress: false

jobs:
  run-tracker:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true

      - name: Run tracker
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          RAPIDAPI_HOST: aliexpress-datahub.p.rapidapi.com
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ALI_REGION: BR
          ALI_LOCALE: pt_BR
          ALI_CURRENCY: BRL
          ALI_SEARCH_TERMS: kit xeon x99,memoria ram,placa de video
          TRACKER_TOP_N: "5"
          TRACKER_MIN_DISCOUNT_PERCENT: "0"
          TRACKER_ENABLE_SCHEDULER: "false"
        run: go run ./src
